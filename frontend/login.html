<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Game36h</title>      
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-y">Game</span>
                    <span class="logo-8">36</span>
                    <span class="logo-com">h</span>
                </a>
            </div>
            <div class="header-actions">
                <a href="register.html" class="btn-register">Đăng ký</a>
            </div>
        </div>
    </header>

    <!-- Auth Container -->
    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Đăng Nhập</h1>
                <p>Chào mừng bạn quay trở lại!</p>
            </div>

<form class="auth-form" id="loginForm">
    <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input 
                type="text" 
                id="username" 
                name="username" 
                placeholder="Nhập username của bạn" 
                required
            >
        </div>
    </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Ghi nhớ đăng nhập</span>
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-auth">Đăng Nhập</button>
            </form>

            <div class="auth-divider">
                <span>hoặc đăng nhập với</span>
            </div>

            <div class="social-login">
                <button class="btn-social google">
                    <span class="social-icon">G</span>
                    <span>Google</span>
                </button>
                <button class="btn-social facebook">
                    <span class="social-icon">f</span>
                    <span>Facebook</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>© 2024 Y8.COM - Chơi game trực tuyến miễn phí!</p>
            </div>
        </div>
    </footer>

    <script src="api.js"></script>
    <script src="main.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
