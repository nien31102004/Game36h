<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Game36h</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-y">Game</span>
                    <span class="logo-8">36</span>
                    <span class="logo-com">h</span>
                </a>
            </div>
            <div class="header-actions">
                <a href="login.html" class="btn-login">Đăng nhập</a>
            </div>
        </div>
    </header>

    <!-- Auth Container -->
    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Đăng Ký</h1>
                <p>Tạo tài khoản mới để bắt đầu chơi game!</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                👁️
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                👁️
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-group avatar-upload">
                    <label>Ảnh đại diện</label>
                    <div class="avatar-preview-wrapper">
                        <div class="avatar-preview" id="avatarPreview">
                            <span>🎮</span>
                        </div>
                        <div class="avatar-upload-btn">
                            <input type="file" id="avatar" name="avatar" accept="image/*" onchange="previewAvatar(event)">
                            <label for="avatar" class="btn-upload">Chọn ảnh</label>
                        </div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="agree-terms">
                        <input type="checkbox" name="agree" required>
                        <span>Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách bảo mật</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-auth">Đăng Ký</button>
            </form>

            <div class="auth-divider">
                <span>hoặc đăng ký với</span>
            </div>

            <div class="social-login">
                <button class="btn-social google">
                    <span class="social-icon">G</span>
                    <span>Google</span>
                </button>
                <button class="btn-social facebook">
                    <span class="social-icon">f</span>
                    <span>Facebook</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>© 2024 Y8.COM - Chơi game trực tuyến miễn phí!</p>
            </div>
        </div>
    </footer>

    <script src="api.js"></script>
    <script src="main.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}" alt="Avatar">`;
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
