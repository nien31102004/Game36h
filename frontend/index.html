<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game36h - Chơi game trực tuyến miễn phí</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-y">Game</span>
                    <span class="logo-8">36</span>
                    <span class="logo-com">h</span>
                </a>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm game...">
                <button class="search-btn" onclick="performSearch()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>

            <div class="header-actions">
                <a href="login.html" class="btn-login">Đăng nhập</a>
                <a href="register.html" class="btn-register">Đăng ký</a>
            </div>
        </div>

    </header>

    <!-- Main -->
    <main class="main-content">

        <!-- Hero -->
        <section class="hero-section">
            <h1>Chơi Game Trực Tuyến Miễn Phí</h1>
            <p>Khám phá hàng ngàn game hấp dẫn!</p>
        </section>

        <!-- Categories -->
        <section class="categories-section">
            <div class="section-header">
                <h2>Thể Loại Game</h2>
            </div>

            <div class="categories-grid" id="categoriesContainer">
                <!-- JS render -->
            </div>
        </section>

        <!-- Recent Games -->
        <section class="game-section">
            <div class="section-header">
                <h2>Game Vừa Có</h2>
            </div>

            <div class="games-grid" id="recentGamesContainer">
                <!-- JS render -->
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>© 2024 Game36h - Chơi game trực tuyến miễn phí!</p>  
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="api.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadHeaderCategories();
            loadCategories();
            loadRecentGames();
            updateHeaderActions();
        });

        // ================= AUTH UI =================
        function updateHeaderActions() {
            const headerActions = document.querySelector('.header-actions');
            if (!headerActions) return;

            if (window.API.Auth.isLoggedIn()) {
                const user = window.API.Auth.getCurrentUser();
                headerActions.innerHTML = `
                    <a href="profile.html" class="user-avatar-link">
                        <img src="${user?.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (user?.username || 'User')}" alt="Avatar" class="header-avatar">
                    </a>
                    <span class="username">${user?.username || 'User'}</span>
                    <button class="btn-register" onclick="window.API.Auth.logout()">Đăng xuất</button>
                `;
            }
        }

        // === SEARCH ===
        function performSearch() {
            const keyword = document.getElementById("searchInput").value.trim();
            if (keyword) {
                window.location.href = `search.html?q=${encodeURIComponent(keyword)}`;
            }
        }

        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") performSearch();
        });

        // ================= HEADER CATEGORIES =================
        async function loadHeaderCategories() {
            try {
                const categories = await window.API.Categories.getCategories();
                const popular = (Array.isArray(categories) ? categories : []).slice(0, 5);
                const header = document.getElementById('headerCategories');
                if (!header) return;

                if (popular.length === 0) {
                    header.innerHTML = '<p style="padding: 8px 20px; color: #999;">Không có thể loại nào</p>';
                    return;
                }

                header.innerHTML = popular.map(cat => `
                    <button class="header-category-btn" onclick="loadGamesByCategory(${cat.id})">
                        ${cat.name}
                    </button>
                `).join('');
            } catch (err) {
                console.error('Load header categories error:', err);
            }
        }

        // ================= CATEGORIES =================
        async function loadCategories() {
            try {
                const categories = await window.API.Categories.getCategories();
                const container = document.getElementById("categoriesContainer");
                if (!container) return;

                const catArray = Array.isArray(categories) ? categories : [];
                if (catArray.length === 0) {
                    container.innerHTML = '<p>Không có thể loại nào</p>';
                    return;
                }

                container.innerHTML = catArray.map(cat => `
                    <div class="category-card" onclick="loadGamesByCategory(${cat.id})" style="cursor: pointer;">
                        <span class="category-icon">🎮</span>
                        <span class="category-name">${cat.name}</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Load categories error:', err);
                document.getElementById("categoriesContainer").innerHTML = '<p>Lỗi tải thể loại</p>';
            }
        }

        // ================= RECENT GAMES =================
        async function loadRecentGames() {
            try {
                const response = await window.API.Games.getGames({ page: 0, limit: 12 });
                const games = response.content || response || [];
                renderRecentGames(games);
            } catch (err) {
                console.error('Load recent games error:', err);
                document.getElementById("recentGamesContainer").innerHTML = '<p>Lỗi tải danh sách game</p>';
            }
        }

        async function loadGamesByCategory(categoryId) {
            try {
                const response = await window.API.Games.getGames({ category: categoryId, page: 0, limit: 12 });
                const games = response.content || response || [];
                renderRecentGames(games);
                
                // Scroll to top
                document.querySelector('.game-section').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error('Load games by category error:', err);
            }
        }

        function renderRecentGames(games) {
            const container = document.getElementById("recentGamesContainer");
            if (!container) return;

            if (!Array.isArray(games) || games.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Không có game nào</p>';
                return;
            }

            container.innerHTML = games.map(game => `
                <div class="game-card" onclick="navigateToGame(${game.id})">
                    <div class="game-thumb">
                        <img src="${game.thumbnail || 'https://via.placeholder.com/300x200?text=' + encodeURIComponent(game.title)}" alt="${game.title}">
                        <div class="game-overlay">
                            <button class="play-btn" onclick="event.stopPropagation(); navigateToGame(${game.id})">Chơi ngay</button>
                        </div>
                    </div>

                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <div class="game-meta">
                            <span>⭐ ${game.averageRating || 0}</span>
                            <span>👁 ${formatNumber(game.views || 0)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ================= NAVIGATION =================
        function navigateToGame(gameId) {
            window.location.href = `game.html?id=${gameId}`;
        }

        // ================= UTILITY =================
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
    </script>

</body>
</html>
