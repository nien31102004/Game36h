<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Game Search - Tìm Kiếm Game</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }

        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        header p {
            color: #aaa;
            margin-top: 5px;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== SEARCH SECTION ===== */
        .search-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 2;
            min-width: 200px;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e94560;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #ff6b8a;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        .search-input::placeholder {
            color: #888;
        }

        .genre-select {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e94560;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            cursor: pointer;
        }

        .genre-select option {
            background: #1a1a2e;
            color: #fff;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-search {
            background: linear-gradient(45deg, #e94560, #ff6b8a);
            color: #fff;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-sort {
            background: linear-gradient(45deg, #00b894, #00d2a0);
            color: #fff;
        }

        .btn-sort:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.5);
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .stats-bar span {
            color: #aaa;
        }

        .stats-bar strong {
            color: #e94560;
        }

        /* ===== GAMES GRID ===== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* ===== GAME CARD ===== */
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: #e94560;
        }

        .game-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(45deg, #2d3436, #636e72);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .game-genre {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(45deg, #e94560, #ff6b8a);
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .game-description {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .play-count {
            color: #00b894;
            font-weight: bold;
        }

        .play-count i {
            margin-right: 5px;
        }

        .btn-play {
            padding: 8px 20px;
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.5);
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== NO RESULTS ===== */
        .no-results {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .search-row {
                flex-direction: column;
            }

            .search-input, .genre-select, .btn {
                width: 100%;
            }

            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎮 Game Search</h1>
        <p>Tìm kiếm và khám phá game yêu thích của bạn</p>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- SEARCH SECTION -->
        <div class="search-section">
            <div class="search-row">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="🔍 Nhập tên game cần tìm..."
                >
                <select id="genreSelect" class="genre-select">
                    <option value="">📁 Tất cả thể loại</option>
                </select>
                <button class="btn btn-search" onclick="searchGames()">
                    🔍 Tìm kiếm
                </button>
                <button class="btn btn-sort" onclick="sortByPlayCount()">
                    🏆 Top lượt chơi
                </button>
                <button class="btn btn-reset" onclick="resetSearch()">
                    🔄 Reset
                </button>
            </div>
        </div>

        <!-- STATS BAR -->
        <div class="stats-bar">
            <span>Tìm thấy <strong id="gameCount">0</strong> game</span>
            <span id="searchInfo"></span>
        </div>

        <!-- GAMES GRID -->
        <div id="gamesContainer" class="games-grid">
            <!-- Games sẽ được render bằng JavaScript -->
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // ===== CONSTANTS =====
        const API_BASE = '/api/games';

        // ===== DOM ELEMENTS =====
        const searchInput = document.getElementById('searchInput');
        const genreSelect = document.getElementById('genreSelect');
        const gamesContainer = document.getElementById('gamesContainer');
        const gameCount = document.getElementById('gameCount');
        const searchInfo = document.getElementById('searchInfo');

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            loadGenres();
            loadAllGames();

            // Tìm kiếm khi nhấn Enter
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchGames();
            });

            // Tìm kiếm khi thay đổi thể loại
            genreSelect.addEventListener('change', searchGames);
        });

        // ===== LOAD GENRES =====
        async function loadGenres() {
            try {
                const response = await fetch(`${API_BASE}/genres`);
                const genres = await response.json();
                
                genres.forEach(genre => {
                    const option = document.createElement('option');
                    option.value = genre;
                    option.textContent = genre;
                    genreSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading genres:', error);
            }
        }

        // ===== LOAD ALL GAMES =====
        async function loadAllGames() {
            showLoading();
            try {
                const response = await fetch(API_BASE);
                const games = await response.json();
                renderGames(games);
                searchInfo.textContent = 'Hiển thị tất cả game';
            } catch (error) {
                console.error('Error loading games:', error);
                showError('Không thể tải danh sách game. Vui lòng kiểm tra server!');
            }
        }

        // ===== SEARCH GAMES =====
        async function searchGames() {
            showLoading();
            
            const name = searchInput.value.trim();
            const genre = genreSelect.value;

            let url = `${API_BASE}/search?`;
            if (name) url += `name=${encodeURIComponent(name)}&`;
            if (genre) url += `genre=${encodeURIComponent(genre)}`;

            try {
                const response = await fetch(url);
                const games = await response.json();
                renderGames(games);

                // Cập nhật thông tin tìm kiếm
                let info = [];
                if (name) info.push(`Tên: "${name}"`);
                if (genre) info.push(`Thể loại: ${genre}`);
                searchInfo.textContent = info.length ? info.join(' | ') : 'Hiển thị tất cả game';
            } catch (error) {
                console.error('Error searching games:', error);
                showError('Lỗi khi tìm kiếm. Vui lòng thử lại!');
            }
        }

        // ===== SORT BY PLAY COUNT =====
        async function sortByPlayCount() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/top`);
                const games = await response.json();
                renderGames(games);
                searchInfo.textContent = '🏆 Sắp xếp theo lượt chơi (cao → thấp)';
            } catch (error) {
                console.error('Error sorting games:', error);
                showError('Lỗi khi sắp xếp. Vui lòng thử lại!');
            }
        }

        // ===== RESET SEARCH =====
        function resetSearch() {
            searchInput.value = '';
            genreSelect.value = '';
            loadAllGames();
        }

        // ===== PLAY GAME (Tăng lượt chơi) =====
        async function playGame(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}/play`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const game = await response.json();
                    // Cập nhật UI
                    const playCountElement = document.querySelector(`#play-count-${id}`);
                    if (playCountElement) {
                        playCountElement.textContent = `▶ ${game.playCount.toLocaleString()} lượt chơi`;
                    }
                    alert(`🎮 Đang chơi: ${game.name}`);
                }
            } catch (error) {
                console.error('Error playing game:', error);
            }
        }

        // ===== RENDER GAMES =====
        function renderGames(games) {
            gameCount.textContent = games.length;

            if (games.length === 0) {
                gamesContainer.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <h3>😢 Không tìm thấy game nào</h3>
                        <p>Thử tìm kiếm với từ khóa khác hoặc chọn thể loại khác</p>
                    </div>
                `;
                return;
            }

            gamesContainer.innerHTML = games.map(game => `
                <div class="game-card">
                    <div class="game-image">
                        ${game.imageUrl 
                            ? `<img src="${game.imageUrl}" alt="${game.name}" style="width:100%;height:100%;object-fit:cover;">` 
                            : '🎮'}
                    </div>
                    <div class="game-content">
                        <h3 class="game-title">${escapeHtml(game.name)}</h3>
                        <span class="game-genre">${escapeHtml(game.genre)}</span>
                        <p class="game-description">
                            ${escapeHtml(game.description || 'Chưa có mô tả')}
                        </p>
                        <div class="game-stats">
                            <span class="play-count" id="play-count-${game.id}">
                                ▶ ${game.playCount ? game.playCount.toLocaleString() : 0} lượt chơi
                            </span>
                            <button class="btn-play" onclick="playGame(${game.id})">
                                Chơi ngay
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== SHOW LOADING =====
        function showLoading() {
            gamesContainer.innerHTML = `
                <div class="loading" style="grid-column: 1 / -1;">
                    <div class="spinner"></div>
                    <p>Đang tải dữ liệu...</p>
                </div>
            `;
        }

        // ===== SHOW ERROR =====
        function showError(message) {
            gamesContainer.innerHTML = `
                <div class="no-results" style="grid-column: 1 / -1;">
                    <h3>❌ Lỗi</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        // ===== ESCAPE HTML (Prevent XSS) =====
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
